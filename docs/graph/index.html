<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Topic Graph — Daily Knowledge</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  body { margin: 0; background: #1a1a2e; overflow: hidden; font-family: sans-serif; }
  svg { width: 100vw; height: 100vh; }
  .node circle { stroke: #4a9eff; stroke-width: 1.5px; }
  .node text { fill: #e0e0f0; font-size: 11px; pointer-events: none; }
  .link { stroke: #2e4a6e; stroke-opacity: 0.6; }
  #tooltip {
    position: fixed; background: #0d1b35; color: #e0e0f0;
    border: 1px solid #4a9eff; padding: 6px 10px; border-radius: 4px;
    font-size: 13px; pointer-events: none; display: none;
  }
  a.back { position: fixed; top: 10px; left: 14px; color: #7ec8ff;
    font-size: 0.9rem; text-decoration: none; }
</style>
</head>
<body>
<a class="back" href="/daily_knowledge/digests/">← Archive</a>
<div id="tooltip"></div>
<svg></svg>
<script>
const graph = {"nodes": [{"id": "quantum_mechanics", "label": "Quantum Mechanics", "category": "Science"}, {"id": "crispr", "label": "CRISPR-Cas9", "category": "Science"}, {"id": "black_holes", "label": "Black Holes", "category": "Science"}, {"id": "protein_folding", "label": "Protein Folding", "category": "Science"}, {"id": "general_relativity", "label": "General Relativity", "category": "Science"}, {"id": "quantum_entanglement", "label": "Quantum Entanglement", "category": "Science"}, {"id": "transformers", "label": "Transformer Architecture", "category": "Tech"}, {"id": "diffusion_models", "label": "Diffusion Models", "category": "Tech"}, {"id": "zk_proofs", "label": "Zero-Knowledge Proofs", "category": "Tech"}, {"id": "homomorphic_encryption", "label": "Homomorphic Encryption", "category": "Tech"}, {"id": "reinforcement_learning", "label": "Reinforcement Learning", "category": "Tech"}, {"id": "quantum_computing", "label": "Quantum Computing", "category": "Tech"}, {"id": "distributed_systems", "label": "Distributed Systems", "category": "Tech"}, {"id": "llm_alignment", "label": "LLM Alignment", "category": "Tech"}, {"id": "bayes_theorem", "label": "Bayes' Theorem", "category": "Math"}, {"id": "fourier_transform", "label": "Fourier Transform", "category": "Math"}, {"id": "godel_incompleteness", "label": "Gödel's Incompleteness Theorems", "category": "Math"}, {"id": "p_vs_np", "label": "P vs NP Problem", "category": "Math"}, {"id": "information_theory", "label": "Information Theory", "category": "Math"}, {"id": "linear_algebra", "label": "Linear Algebra", "category": "Math"}, {"id": "optimization", "label": "Mathematical Optimization", "category": "Math"}, {"id": "lambda_calculus", "label": "Lambda Calculus", "category": "Logic"}, {"id": "type_theory", "label": "Type Theory", "category": "Logic"}, {"id": "curry_howard", "label": "Curry-Howard Correspondence", "category": "Logic"}, {"id": "computability", "label": "Computability Theory", "category": "Logic"}, {"id": "computational_complexity", "label": "Computational Complexity", "category": "Math"}, {"id": "causal_inference", "label": "Causal Inference", "category": "Math"}, {"id": "dark_matter", "label": "Dark Matter", "category": "Science"}, {"id": "evolution", "label": "Theory of Evolution", "category": "Science"}, {"id": "thermodynamics", "label": "Laws of Thermodynamics", "category": "Science"}, {"id": "epigenetics", "label": "Epigenetics", "category": "Science"}, {"id": "neuroscience_plasticity", "label": "Neuroplasticity", "category": "Science"}, {"id": "cern_higgs", "label": "Higgs Boson", "category": "Science"}, {"id": "climate_science", "label": "Climate Science", "category": "Science"}, {"id": "stem_cells", "label": "Stem Cell Biology", "category": "Science"}, {"id": "risc_v", "label": "RISC-V Architecture", "category": "Tech"}, {"id": "graph_neural_networks", "label": "Graph Neural Networks", "category": "Tech"}, {"id": "webassembly", "label": "WebAssembly", "category": "Tech"}, {"id": "blockchain", "label": "Blockchain Technology", "category": "Tech"}, {"id": "formal_verification", "label": "Formal Verification", "category": "Tech"}, {"id": "operating_systems", "label": "Operating System Design", "category": "Tech"}, {"id": "monte_carlo", "label": "Monte Carlo Methods", "category": "Math"}, {"id": "group_theory", "label": "Group Theory", "category": "Math"}, {"id": "topology", "label": "Topology", "category": "Math"}, {"id": "number_theory", "label": "Number Theory", "category": "Math"}, {"id": "graph_theory", "label": "Graph Theory", "category": "Math"}, {"id": "differential_equations", "label": "Differential Equations", "category": "Math"}, {"id": "category_theory_math", "label": "Category Theory", "category": "Math"}, {"id": "sat_solvers", "label": "SAT Solvers", "category": "Logic"}, {"id": "category_theory_logic", "label": "Category Theory in Logic", "category": "Logic"}, {"id": "modal_logic", "label": "Modal Logic", "category": "Logic"}, {"id": "proof_theory", "label": "Proof Theory", "category": "Logic"}, {"id": "homotopy_type_theory", "label": "Homotopy Type Theory", "category": "Logic"}, {"id": "synthetic_biology", "label": "Synthetic Biology", "category": "Science"}, {"id": "game_theory", "label": "Game Theory", "category": "Math"}, {"id": "elliptic_curves", "label": "Elliptic Curves", "category": "Math"}, {"id": "neural_ode", "label": "Neural ODEs", "category": "Tech"}, {"id": "measure_theory", "label": "Measure Theory", "category": "Math"}, {"id": "linear_logic", "label": "Linear Logic", "category": "Logic"}, {"id": "descriptive_complexity", "label": "Descriptive Complexity", "category": "Logic"}], "edges": []};
const catColor = {
  Science: '#4aef9f', Tech: '#4a9eff', Math: '#f0d060', Logic: '#f08060'
};
const svg = d3.select('svg');
const w = window.innerWidth, h = window.innerHeight;

const simulation = d3.forceSimulation(graph.nodes)
  .force('link', d3.forceLink(graph.edges).id(d => d.id).distance(120))
  .force('charge', d3.forceManyBody().strength(-120))
  .force('center', d3.forceCenter(w / 2, h / 2));

const link = svg.append('g').selectAll('line')
  .data(graph.edges).join('line').attr('class', 'link')
  .attr('stroke-width', d => Math.sqrt(d.weight));

const node = svg.append('g').selectAll('g')
  .data(graph.nodes).join('g').attr('class', 'node')
  .call(d3.drag()
    .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

node.append('circle').attr('r', 8).attr('fill', d => catColor[d.category] || '#aaa');
node.append('text').attr('dx', 11).attr('dy', 4).text(d => d.label);

const tip = document.getElementById('tooltip');
node.on('mouseover', (e, d) => {
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top = (e.clientY - 8) + 'px';
  tip.textContent = d.label + ' (' + d.category + ')';
}).on('mouseout', () => { tip.style.display = 'none'; })
  .on('click', (e, d) => { window.open('/daily_knowledge/topic/' + d.id + '/', '_blank'); });

simulation.on('tick', () => {
  link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x}, ${d.y})`);
});
</script>
</body>
</html>
