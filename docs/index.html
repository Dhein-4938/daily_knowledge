<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Daily Knowledge Digest</title>
<script>
MathJax = {
  tex: {
    inlineMath: [['$', '$']],
    displayMath: [['$$', '$$']],
    processEscapes: true
  },
  options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
};
</script>
<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>document.addEventListener('DOMContentLoaded', () => {
  hljs.highlightAll();
  // Mark visited topic nav pills using localStorage
  const nav = document.querySelector('.topic-nav');
  if (nav) {
    // Mark current scroll position topics as visited on intersection
    const articles = document.querySelectorAll('article[id]');
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const key = 'visited:' + e.target.id;
          localStorage.setItem(key, '1');
          const pill = nav.querySelector('a[href="#' + e.target.id + '"]');
          if (pill) pill.classList.add('visited');
        }
      });
    }, {threshold: 0.3});
    articles.forEach(a => obs.observe(a));
    // Restore visited state on page load
    articles.forEach(a => {
      if (localStorage.getItem('visited:' + a.id)) {
        const pill = nav.querySelector('a[href="#' + a.id + '"]');
        if (pill) pill.classList.add('visited');
      }
    });
  }
});</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e;
    color: #e0e0f0;
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 17px;
    line-height: 1.7;
    padding: 2rem 1rem;
  }
  .page { max-width: 820px; margin: 0 auto; }
  /* Header */
  .digest-header {
    border: 2px solid #4a9eff;
    border-radius: 8px;
    padding: 1.2rem 1.6rem;
    margin-bottom: 1.8rem;
    background: #0d1b35;
  }
  .digest-header h1 {
    font-size: 1.4rem;
    color: #4a9eff;
    margin-bottom: 0.3rem;
  }
  .digest-header .meta { color: #8898bb; font-size: 0.95rem; }
  /* Topic nav */
  .topic-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 2rem;
    position: sticky;
    top: 0;
    background: #1a1a2e;
    padding: 0.6rem 0;
    z-index: 10;
  }
  .topic-nav a {
    background: #1e2a45;
    color: #7ec8ff;
    text-decoration: none;
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.88rem;
    border: 1px solid #2e4a6e;
    transition: background 0.15s;
  }
  .topic-nav a:hover { background: #2a3d5e; }
  .topic-nav a.visited::before {
    content: '●';
    color: #5fca5f;
    margin-right: 0.3em;
    font-size: 0.7em;
    vertical-align: middle;
  }
  /* Topic article */
  article {
    margin-bottom: 3.5rem;
    scroll-margin-top: 1rem;
  }
  .topic-header {
    border-left: 4px solid #4a9eff;
    padding: 0.8rem 1rem;
    background: #111828;
    border-radius: 0 6px 6px 0;
    margin-bottom: 1.4rem;
  }
  .topic-header h2 {
    color: #7ec8ff;
    font-size: 1.3rem;
    margin-bottom: 0.25rem;
  }
  .topic-header .topic-meta { color: #7a8db0; font-size: 0.88rem; }
  /* Back link */
  .back-link {
    display: inline-block;
    margin-bottom: 1.5rem;
    color: #7ec8ff;
    text-decoration: none;
    font-size: 0.92rem;
  }
  .back-link:hover { text-decoration: underline; }
  /* Body typography */
  .body h2 {
    color: #4a9eff;
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 1.6rem 0 0.6rem;
    padding-bottom: 0.3rem;
    border-bottom: 1px solid #2a3d5e;
  }
  .body h3 {
    color: #c5d8f5;
    font-size: 1.05rem;
    margin: 1.2rem 0 0.4rem;
  }
  .body p { margin: 0.7rem 0; }
  .body strong { color: #fff; }
  .body em { color: #c9d8f0; font-style: italic; }
  .body a { color: #7ec8ff; text-decoration: none; }
  .body a:hover { text-decoration: underline; }
  .body hr { border: none; border-top: 1px solid #2a3d5e; margin: 1.4rem 0; }
  .body ul, .body ol { margin: 0.6rem 0 0.6rem 1.6rem; }
  .body li { margin: 0.25rem 0; }
  .body blockquote {
    border-left: 3px solid #3a5070;
    padding: 0.4rem 1rem;
    color: #8898bb;
    margin: 0.8rem 0;
    font-style: italic;
  }
  /* Callouts */
  .callout {
    border-radius: 6px;
    padding: 0.8rem 1rem;
    margin: 1rem 0;
  }
  .callout .callout-title {
    font-weight: bold;
    font-size: 0.9rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.4rem;
  }
  .callout.info  { background: #0a1f3a; border-left: 4px solid #4a9eff; }
  .callout.info  .callout-title { color: #4a9eff; }
  .callout.tip   { background: #1e1a00; border-left: 4px solid #f0d060; }
  .callout.tip   .callout-title { color: #f0d060; }
  .callout.warning { background: #2a0a0a; border-left: 4px solid #ff6060; }
  .callout.warning .callout-title { color: #ff6060; }
  /* Code */
  .body pre {
    border-radius: 6px;
    overflow-x: auto;
    margin: 1rem 0;
    font-size: 0.9rem;
  }
  .body code:not(pre code) {
    background: #1e2a45;
    color: #a8cfff;
    padding: 0.1em 0.35em;
    border-radius: 3px;
    font-family: 'Fira Code', 'Consolas', monospace;
    font-size: 0.88em;
  }
  /* Single topic page */
  .single-topic article { margin-bottom: 0; }
  /* Reviewed badge */
  .badge-reviewed {
    display: inline-block;
    background: #1a3a1a;
    color: #5fca5f;
    border: 1px solid #3a6a3a;
    border-radius: 12px;
    font-size: 0.78rem;
    padding: 0.1rem 0.55rem;
    margin-left: 0.5rem;
    vertical-align: middle;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

</div>
</body>
</html>
